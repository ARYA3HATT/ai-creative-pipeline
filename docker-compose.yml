version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: creative_pipeline_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - creative_network
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creative_pipeline_backend
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./shared_data:/app/shared_data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/shared_data/jobs.db
      - OUTPUT_DIR=/app/outputs
    env_file:
      - .env
    depends_on:
      - redis
    command: uvicorn backend.app:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - creative_network
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: always

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creative_pipeline_worker
    volumes:
      - ./outputs:/app/outputs
      - ./shared_data:/app/shared_data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/shared_data/jobs.db
      - OUTPUT_DIR=/app/outputs
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A backend.celery_worker.celery_app worker --loglevel=info
    networks:
      - creative_network
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creative_pipeline_frontend
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
      - ./shared_data:/app/shared_data
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:////app/shared_data/jobs.db
      - OUTPUT_DIR=/app/outputs
      - BACKEND_URL=http://backend:8000
    env_file:
      - .env
    depends_on:
      - backend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    networks:
      - creative_network
    restart: always

volumes:
  redis_data:
  shared_data:

networks:
  creative_network:
    driver: bridge
